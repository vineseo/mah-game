<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Team 1 | 줄다리기 수학</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--p:#2563eb;--light:#dbeafe;--dark:#1e3a8a;--bg:#eff6ff;--ink:#0f172a;--muted:#64748b;--border:#bfdbfe}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
header{background:linear-gradient(135deg,var(--p),#1d4ed8);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-family:'Black Han Sans',sans-serif;font-size:22px;color:#fff}
.timer-badge{background:rgba(0,0,0,.3);border-radius:99px;padding:6px 14px;font-family:'Black Han Sans',sans-serif;font-size:20px;color:#fff;border:1px solid rgba(255,255,255,.3)}
.timer-badge.urgent{color:#fbbf24;animation:blink .5s ease infinite alternate}
@keyframes blink{from{opacity:1}to{opacity:.5}}
.score-strip{background:var(--dark);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.my-score{font-family:'Black Han Sans',sans-serif;font-size:28px;color:#fff}
.opp-score{font-family:'Black Han Sans',sans-serif;font-size:20px;color:rgba(255,255,255,.5)}
.tug-bar-wrap{flex:1;margin:0 14px;height:8px;background:rgba(255,255,255,.15);border-radius:99px;position:relative}
.tug-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:16px;height:16px;background:#fff;border-radius:50%;border:3px solid var(--p);transition:left .2s ease}
.problem-card{background:#fff;border-bottom:3px solid var(--border);padding:24px 18px;flex-shrink:0}
.prompt{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:12px;text-align:center}
.problem{font-family:'Black Han Sans',sans-serif;font-size:52px;text-align:center;color:var(--ink);line-height:1.1}
.answer-row{display:flex;align-items:center;justify-content:center;margin-top:16px;background:var(--light);border:2px solid var(--border);border-radius:12px;padding:12px 16px;min-height:56px}
.answer-display{font-family:'Black Han Sans',sans-serif;font-size:36px;color:var(--p);flex:1;text-align:center;letter-spacing:2px}
.cursor{animation:cur .8s ease infinite;display:inline-block;width:3px;height:36px;background:var(--p);vertical-align:middle;border-radius:2px}
@keyframes cur{0%,49%{opacity:1}50%,100%{opacity:0}}
.keypad{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px;flex:1;align-content:start}
.key{border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:26px;cursor:pointer;padding:0;aspect-ratio:1;display:flex;align-items:center;justify-content:center;transition:transform .08s ease,filter .08s ease}
.key:active{transform:scale(.93);filter:brightness(.85)}
.key.num{background:#fff;color:var(--ink);border:1.5px solid var(--border)}
.key.del{background:#fef2f2;color:#dc2626;border:1.5px solid #fecaca;font-size:18px}
.key.bs{background:#f1f5f9;color:var(--muted);border:1.5px solid #e2e8f0;font-size:20px}
.key.submit{background:linear-gradient(135deg,var(--p),#1d4ed8);color:#fff;border:none;font-size:18px;grid-column:span 2;aspect-ratio:auto;padding:16px}
.key:disabled{opacity:1;cursor:not-allowed}
.feedback{position:fixed;inset:0;pointer-events:none;z-index:50;opacity:0;transition:opacity .1s}
.feedback.show{opacity:1}
.feedback.ok{background:rgba(34,197,94,.25)}
.feedback.ng{background:rgba(239,68,68,.2)}
/* 대기 오버레이 – 키패드 위 영역만 덮음 */
.waiting{
  position:absolute;top:0;left:0;right:0;
  background:rgba(219,234,254,.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;z-index:100;
  padding:24px 18px;
  border-bottom:3px solid var(--border);
}
.waiting h2{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--p)}
.waiting p{color:var(--muted);font-size:14px;font-weight:700;text-align:center;line-height:1.7}
.spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-bar{background:var(--dark);padding:8px 16px;display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.6);font-weight:700;flex-shrink:0}
.conn-badge{font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.1)}
.conn-badge.ok{background:rgba(34,197,94,.2);color:#86efac}
.conn-badge.err{background:rgba(239,68,68,.2);color:#fca5a5}
</style>
</head>
<body>
<div class="feedback" id="feedback"></div>
<div class="waiting" id="waiting">
  <div class="spinner"></div>
  <h2>🔵 Team 1</h2>
  <p>관리자가 게임을 시작하면<br>자동으로 시작됩니다.</p>
  <span id="connBadge" class="conn-badge">Firebase 연결중…</span>
</div>
<header>
  <h1 id="myTeamName">🔵 Team 1</h1>
  <div class="timer-badge" id="timer">--</div>
</header>
<div class="score-strip">
  <div><div style="font-size:11px;color:rgba(255,255,255,.5);font-weight:700">내 점수</div><div class="my-score" id="myScore">0</div></div>
  <div class="tug-bar-wrap"><div class="tug-dot" id="tugDot" style="left:50%"></div></div>
  <div style="text-align:right"><div style="font-size:11px;color:rgba(255,255,255,.5);font-weight:700">상대 점수</div><div class="opp-score" id="oppScore">0</div></div>
</div>
<div class="problem-card">
  <div class="prompt">다음 문제의 정답을 입력하세요!</div>
  <div class="problem" id="problem">?</div>
  <div class="answer-row"><div class="answer-display" id="answerDisplay"><span class="cursor"></span></div></div>
</div>
<div class="keypad">
  <button class="key num" onclick="press('1')">1</button>
  <button class="key num" onclick="press('2')">2</button>
  <button class="key num" onclick="press('3')">3</button>
  <button class="key del" onclick="press('DEL')">전체<br>삭제</button>
  <button class="key num" onclick="press('4')">4</button>
  <button class="key num" onclick="press('5')">5</button>
  <button class="key num" onclick="press('6')">6</button>
  <button class="key bs" onclick="press('BS')">⌫</button>
  <button class="key num" onclick="press('7')">7</button>
  <button class="key num" onclick="press('8')">8</button>
  <button class="key num" onclick="press('9')">9</button>
  <button class="key num" onclick="press('0')">0</button>
  <button class="key submit" onclick="submitAnswer()">정답 제출 ✔</button>
</div>
<div class="status-bar">
  <span id="statusTxt">대기중</span>
  <a href="intro.html" style="color:rgba(255,255,255,.4);font-size:11px;text-decoration:none">← 메인</a>
</div>

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const ROOT = 'tug_game';

  import { push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  let currentVal='', gameRunning=false;

  // Firebase 연결 상태
  onValue(ref(db,'.info/connected'), snap=>{
    const ok=snap.val();
    const b=document.getElementById('connBadge');
    b.textContent=ok?'Firebase 연결됨':'연결 끊김';
    b.className='conn-badge '+(ok?'ok':'err');
  });

  function updateDisplay(){
    const el=document.getElementById('answerDisplay');
    if(currentVal===''){el.innerHTML='<span class="cursor"></span>';}
    else{el.textContent=currentVal;}
  }

  window.press=function(k){
    if(!gameRunning) return;
    if(k==='DEL') currentVal='';
    else if(k==='BS') currentVal=currentVal.slice(0,-1);
    else if(currentVal.length<6) currentVal+=k;
    updateDisplay();
  };

  window.submitAnswer=async function(){
    if(!gameRunning||currentVal==='') return;
    await push(ref(db, ROOT+'/answers'), {team:1, answer:currentVal, handled:false, ts:Date.now()});
    flash('ok');
    currentVal=''; updateDisplay();
  };

  function flash(type){
    const el=document.getElementById('feedback');
    el.className='feedback '+type+' show';
    setTimeout(()=>el.classList.remove('show'),300);
  }

  // ── Firebase 상태 수신 ──
  onValue(ref(db, ROOT+'/state'), snap=>{
    const d=snap.val();
    if(!d) return;
    const running=d.running&&!d.paused&&!d.win;
    gameRunning=running;

    document.getElementById('waiting').style.display=(!d.running&&!d.win)?'flex':'none';
    document.getElementById('myTeamName').textContent='🔵 '+(d.t1Name||'Team 1');

    const tl=d.timeLeft??0;
    const tel=document.getElementById('timer');
    tel.textContent=String(tl).padStart(2,'0');
    tel.className='timer-badge'+(tl<=10&&running?' urgent':'');

    document.getElementById('myScore').textContent=d.t1Score??0;
    document.getElementById('oppScore').textContent=d.t2Score??0;
    document.getElementById('problem').textContent=d.t1Q?.text||'?';
    document.getElementById('tugDot').style.left=(50+(( d.tug??0)/100)*40)+'%';

    document.getElementById('statusTxt').textContent=
      d.win?'게임 종료! '+(d.win===1?(d.t1Name||'Team 1')+' 승리!':'상대팀 승리'):
      d.paused?'⏸ 일시정지':running?'🟢 게임 진행중':'⏳ 대기중';

    document.querySelectorAll('.key').forEach(k=>k.disabled=!running);
  });

  document.addEventListener('keydown',e=>{
    if(!gameRunning) return;
    if(e.key>='0'&&e.key<='9') window.press(e.key);
    else if(e.key==='Backspace') window.press('BS');
    else if(e.key==='Delete') window.press('DEL');
    else if(e.key==='Enter') window.submitAnswer();
  });

  updateDisplay();
</script>
</body>
</html>
